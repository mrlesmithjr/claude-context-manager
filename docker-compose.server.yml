# context-manager server stack.
#
# Works on macOS and Linux: SQLite lives in a Docker-managed named volume, never
# a bind mount. Bind-mounting ~/.claude-context/ causes WAL locking corruption on
# macOS due to Docker Desktop VirtioFS (Design Decision #17).
#
# Architecture:
#   Mac hooks  →  CONTEXT_MANAGER_URL=http://localhost:4000  →  context-server
#   context-server owns /data/context.db in named volume (no host FS exposure)
#
# Usage:
#   make server-init    generate token, write ~/.claude-context/.env
#   make server-build   build the server image
#   make server-start   start all services (builds image if needed)
#   make server-stop    stop all services
#   make server-logs    tail logs
#   make server-status  check health
#
# Data lives in the 'context-manager-data' named volume.
# To migrate from an existing local DB, see issue #52 (web UI import).

services:
  context-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: context-manager-server:latest
    command: node /app/docker/start-mcp-server.mjs
    ports:
      # Bind to localhost only — not externally reachable from other machines.
      - "127.0.0.1:4000:4000"
    environment:
      CONTEXT_MANAGER_DB: /data/context.db
      CONTEXT_MANAGER_TOKEN: ${CONTEXT_MANAGER_TOKEN}
      CONTEXT_MANAGER_PORT: "4000"
      # 0.0.0.0 binds to all container interfaces (host access via 127.0.0.1:4000 port mapping).
      CONTEXT_MANAGER_HOST: "0.0.0.0"
      CONTEXT_MANAGER_EMBED_INTERVAL: "10"
      LOG_LEVEL: info
    volumes:
      # Docker-managed named volume: SQLite WAL locking works correctly.
      # Data persists across container restarts, stops, and image rebuilds.
      - context-manager-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  web-ui:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: context-manager-server:latest
    command: node /app/dist/web/server.js
    ports:
      # Bind to localhost only — not externally reachable from other machines.
      - "127.0.0.1:3847:3847"
    environment:
      CONTEXT_MANAGER_DB: /data/context.db
      CONTEXT_MANAGER_TOKEN: ${CONTEXT_MANAGER_TOKEN}
      CONTEXT_MANAGER_PORT: "3847"
      # 0.0.0.0 binds to all container interfaces and activates bearer token auth
      # + project scoping in the web server (isNetworkMode=true).
      CONTEXT_MANAGER_HOST: "0.0.0.0"
      LOG_LEVEL: info
    volumes:
      - context-manager-data:/data
    depends_on:
      context-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3847/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

volumes:
  context-manager-data:
    # Docker-managed named volume. Never bind-mount the host filesystem here.
    driver: local
